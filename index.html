<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Carrito - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --card-bg: white;
            --card-border: #f1f5f9;
            --input-bg: #f1f5f9;
            --tab-bg: #f1f5f9;
            --tab-active: white;
            --tab-text: #64748b;
        }

        .dark {
            --bg-body: #020617;
            --text-main: #f8fafc;
            --card-bg: #0f172a;
            --card-border: #1e293b;
            --input-bg: #1e293b;
            --tab-bg: #1e293b;
            --tab-active: #334155;
            --tab-text: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease;
        }

        .premium-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
        }

        .input-wrapper {
            background: var(--input-bg);
            border-radius: 1.2rem;
            border: 2px solid transparent;
        }
        
        .input-wrapper:focus-within {
            border-color: #3b82f6;
            background: var(--card-bg);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            font-weight: 700;
            font-size: 0.75rem;
            border-radius: 1.5rem;
            transition: all 0.2s;
            color: var(--tab-text);
        }

        .tab-active {
            background: var(--tab-active);
            color: #2563eb;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-send-text {
            background: #22c55e;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            padding: 1.1rem;
            border-radius: 1.5rem;
            width: 100%;
            display: block;
            text-align: center;
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-send-text:active { transform: scale(0.98); }

        .header-bg {
            background: #0f172a;
            border-radius: 0 0 2.5rem 2.5rem;
        }

        .btn-borrar-todo {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
            padding: 0.5rem 1rem;
            border-radius: 0.8rem;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        
        .dark .btn-borrar-todo {
            background: #742a2a33;
            border-color: #9b2c2c55;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-body);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #3b82f633;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0f172a;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 800;
            opacity: 0;
            transition: all 0.3s;
            z-index: 50;
        }

        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div></div>
    <div id="toast">¡Sumado!</div>

    <header class="header-bg text-white shadow-2xl mb-4">
        <div class="max-w-md mx-auto p-5 pb-6">
            <div class="flex justify-between items-start mb-4">
                <div class="flex-1 mr-4">
                    <div class="flex items-center gap-3 mb-1">
                        <h1 class="text-xl font-800 tracking-tight">🛒 Carrito</h1>
                        <button onclick="toggleTheme()" class="bg-white/10 p-2 rounded-xl">🌙</button>
                    </div>
                    <input type="text" id="shop-name" oninput="saveProfile()"
                           class="text-slate-400 font-500 text-xs bg-transparent outline-none border-b border-white/10 w-full" 
                           placeholder="Nombre del establecimiento">
                </div>
                
                <div class="text-right">
                    <div class="bg-slate-800/80 px-3 py-1.5 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-500 uppercase">Tasa Bs/$</p>
                        <input type="text" id="tasa-input" inputmode="decimal" value="44.14" oninput="saveProfile()"
                               class="font-800 text-white text-lg text-right w-16 bg-transparent outline-none">
                    </div>
                    <p id="date-display" class="text-[9px] font-bold text-slate-500 mt-1 uppercase"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-blue-600/10 p-3.5 rounded-3xl border border-blue-500/20 text-center">
                    <p class="text-[9px] text-blue-400 font-black uppercase">USD</p>
                    <div class="text-2xl font-800 text-blue-500">$ <span id="total-usd" class="text-white">0.00</span></div>
                </div>
                <div class="bg-emerald-600/10 p-3.5 rounded-3xl border border-emerald-500/20 text-center">
                    <p class="text-[9px] text-emerald-400 font-black uppercase">VES</p>
                    <div class="text-2xl font-800 text-emerald-500"><span class="text-[10px]">Bs</span> <span id="total-ves" class="text-white">0.00</span></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5">
        <div class="premium-card p-3 shadow-sm mb-4">
            <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-[1.8rem] mb-3">
                <button id="mode-usd" onclick="changeMode('USD')" class="tab-btn tab-active uppercase">Dólares ($)</button>
                <button id="mode-ves" onclick="changeMode('VES')" class="tab-btn uppercase">Bolívares (Bs)</button>
            </div>

            <div class="px-2 space-y-3">
                <div class="input-wrapper px-4 py-2">
                    <label class="text-[8px] font-black text-slate-400 uppercase block">Producto</label>
                    <input type="text" id="prod-name" class="font-600 text-sm w-full bg-transparent outline-none" placeholder="Nombre del artículo">
                </div>

                <div class="flex gap-3 items-center">
                    <div class="input-wrapper flex-1 px-4 py-2">
                        <label id="price-label" class="text-[8px] font-black text-slate-400 uppercase block">Precio $</label>
                        <input type="text" id="prod-price" inputmode="decimal" class="text-3xl font-900 w-full bg-transparent outline-none" placeholder="0.00">
                    </div>
                    <button onclick="addToList()" id="add-btn" class="bg-blue-600 text-white w-14 h-14 rounded-3xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                        <span class="text-3xl font-light">+</span>
                    </button>
                </div>
                <p class="text-[10px] text-center font-bold text-slate-400 uppercase pb-2">Presiona enter o el botón "+" para sumar</p>
            </div>
        </div>

        <!-- SECCIÓN RESUMEN AJUSTADA A TUS CAPTURAS -->
        <div class="flex justify-between items-center px-1 py-4">
            <h2 class="text-[13px] font-800 text-slate-500 uppercase tracking-wide">Resumen de cuenta</h2>
            <button id="btn-clear-all" onclick="clearCart()" class="btn-borrar-todo hidden">Borrar Todo</button>
        </div>

        <div id="items-list" class="space-y-3 mb-6"></div>

        <div id="action-container" class="hidden pb-10">
            <button onclick="sendWhatsApp()" class="btn-send-text">Enviar Factura</button>
            <div class="text-center text-[10px] font-bold text-slate-400 mt-4 uppercase">Generado por Feedback 2026</div>
        </div>
    </main>

    <script>
        let shoppingCart = [];
        let currentMode = 'USD';
        let isDarkMode = false;

        // Limpiar pantalla de carga al iniciar
        window.onload = () => {
            document.getElementById('loading').style.display = 'none';
            loadData();
        };

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark', isDarkMode);
        }

        function changeMode(mode) {
            currentMode = mode;
            document.getElementById('mode-usd').className = mode === 'USD' ? 'tab-btn tab-active' : 'tab-btn';
            document.getElementById('mode-ves').className = mode === 'VES' ? 'tab-btn tab-active' : 'tab-btn';
            document.getElementById('price-label').innerText = mode === 'USD' ? 'Precio $' : 'Precio Bs';
            document.getElementById('add-btn').className = mode === 'USD' ? 'bg-blue-600 text-white w-14 h-14 rounded-3xl flex items-center justify-center shadow-lg active:scale-90 transition-transform' : 'bg-emerald-600 text-white w-14 h-14 rounded-3xl flex items-center justify-center shadow-lg active:scale-90 transition-transform';
            document.getElementById('prod-price').focus();
        }

        function saveProfile() {
            localStorage.setItem('cart_config', JSON.stringify({
                tasa: document.getElementById('tasa-input').value,
                shop: document.getElementById('shop-name').value
            }));
            render();
        }

        function loadData() {
            const config = JSON.parse(localStorage.getItem('cart_config') || '{}');
            if(config.tasa) document.getElementById('tasa-input').value = config.tasa;
            if(config.shop) document.getElementById('shop-name').value = config.shop;
            
            shoppingCart = JSON.parse(localStorage.getItem('cart_items') || '[]');
            render();
        }

        function addToList() {
            const pInput = document.getElementById('prod-price');
            const nInput = document.getElementById('prod-name');
            const price = parseFloat(pInput.value.replace(',', '.'));
            
            if (!price || price <= 0) return;

            const item = {
                id: Date.now(),
                name: nInput.value.trim() || 'Ítem ' + (shoppingCart.length + 1),
                price: price,
                mode: currentMode
            };

            shoppingCart.unshift(item);
            localStorage.setItem('cart_items', JSON.stringify(shoppingCart));
            
            pInput.value = '';
            nInput.value = '';
            render();
            showToast();
        }

        function removeItem(id) {
            shoppingCart = shoppingCart.filter(i => i.id !== id);
            localStorage.setItem('cart_items', JSON.stringify(shoppingCart));
            render();
        }

        function clearCart() {
            shoppingCart = [];
            localStorage.removeItem('cart_items');
            render();
        }

        function render() {
            const list = document.getElementById('items-list');
            const tasa = parseFloat(document.getElementById('tasa-input').value.replace(',', '.')) || 1;
            let totalUsd = 0;
            let totalVes = 0;

            list.innerHTML = '';
            
            shoppingCart.forEach((item, index) => {
                const usd = item.mode === 'USD' ? item.price : item.price / tasa;
                const ves = item.mode === 'VES' ? item.price : item.price * tasa;
                totalUsd += usd;
                totalVes += ves;

                const card = document.createElement('div');
                card.className = "premium-card p-4 flex justify-between items-center shadow-sm relative";
                card.innerHTML = `
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Item ${shoppingCart.length - index}</p>
                        <p class="text-xl font-800">${item.mode === 'USD' ? '$' : 'Bs'} ${item.price.toLocaleString('es-VE', {minimumFractionDigits:2})}</p>
                        <p class="text-[10px] font-bold text-blue-500">≈ ${item.mode === 'USD' ? 'Bs ' + ves.toLocaleString('es-VE', {minimumFractionDigits:2}) : '$ ' + usd.toLocaleString('en-US', {minimumFractionDigits:2})}</p>
                    </div>
                    <button onclick="removeItem(${item.id})" class="text-red-400 p-2">🗑️</button>
                `;
                list.appendChild(card);
            });

            document.getElementById('total-usd').innerText = totalUsd.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
            document.getElementById('total-ves').innerText = totalVes.toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2});
            
            document.getElementById('btn-clear-all').classList.toggle('hidden', shoppingCart.length === 0);
            document.getElementById('action-container').classList.toggle('hidden', shoppingCart.length === 0);
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function sendWhatsApp() {
            const shop = document.getElementById('shop-name').value || 'MI COMPRA';
            const tasa = document.getElementById('tasa-input').value;
            let msg = `🛒 *CARRITO: ${shop.toUpperCase()}*\n`;
            msg += `━━━━━━━━━━━━━━━\n`;
            shoppingCart.forEach(i => {
                msg += `• ${i.name}: ${i.mode==='USD'?'$':'Bs'} ${i.price}\n`;
            });
            msg += `━━━━━━━━━━━━━━━\n`;
            msg += `💵 TOTAL: $ ${document.getElementById('total-usd').innerText}\n`;
            msg += `🇻🇪 TOTAL: Bs ${document.getElementById('total-ves').innerText}\n`;
            msg += `📊 TASA: ${tasa} Bs/$\n`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        document.getElementById('prod-price').onkeypress = (e) => { if(e.key==='Enter') addToList(); };
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-VE', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();
    </script>
</body>
</html>
